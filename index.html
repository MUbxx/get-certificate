<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyber Buddy Academy - Certificate Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: rgba(0,0,0,0.6);
    padding: 40px;
    border-radius: 15px;
    width: 400px;
    text-align: center;
    box-shadow: 0 0 25px #00f2ff;
    backdrop-filter: blur(15px);
}

h1 {
    color: #00f2ff;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    border-radius: 8px;
    border: none;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    border-radius: 8px;
    border: none;
    background: #00f2ff;
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #00c3cc;
}

.error {
    color: red;
    margin-top: 15px;
}

.success {
    margin-top: 15px;
}

iframe {
    margin-top: 20px;
    width: 100%;
    height: 400px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Cyber Buddy Academy</h1>
    <p>Enter Your Bill Number to Download Certificate</p>

    <input type="text" id="billNumber" placeholder="Enter Bill Number">
    <button onclick="verifyCertificate()">View Certificate</button>

    <div id="message"></div>
    <iframe id="pdfViewer" style="display:none;"></iframe>
</div>

<script>
async function verifyCertificate() {
    const bill = document.getElementById("billNumber").value.trim();
    const message = document.getElementById("message");
    const viewer = document.getElementById("pdfViewer");

    const response = await fetch("certificates.json");
    const data = await response.json();

    if(data[bill]) {
        message.innerHTML = "<div class='success'>Certificate Found ✅</div>";
        viewer.src = data[bill];
        viewer.style.display = "block";
    } else {
        message.innerHTML = "<div class='error'>Invalid Bill Number ❌</div>";
        viewer.style.display = "none";
    }
}
</script>

</body>
</html>
